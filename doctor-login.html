<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doctor Portal Login — MediConnect</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #e0f2fe; color: #1e293b; margin: 0; font-family: 'Inter', sans-serif;}
    .auth-card { background: #ffffff; padding: 40px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05); }
    .auth-title { font-size: 24px; font-weight: 700; text-align: center; margin-bottom: 24px; color: #0f172a; }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 13px; color: #64748b; margin-bottom: 6px; font-weight: 600; }
    .form-control { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #cbd5e1; box-sizing: border-box; }
    .form-control:focus { outline: none; border-color: #0ea5e9; box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.2); }
    .btn { width: 100%; padding: 12px; background: #0ea5e9; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; margin-top: 10px;}
    .btn:hover { background: #0284c7; }
    .badge { background: #0ea5e9; color: white; padding: 4px 8px; border-radius: 4px; font-size: 11px; margin-bottom: 10px; display: inline-block;}
  </style>
</head>
<body>
  <div class="auth-card">
    <div style="text-align: center;"><span class="badge">MEDICAL STAFF</span></div>
    <div class="auth-title">👨‍⚕️ Doctor Portal</div>
    <form id="doctorLoginForm">
      <div class="form-group">
        <label class="form-label">Professional Email</label>
        <input type="email" id="email" class="form-control" placeholder="dr.name@hospital.com" required />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Enter password" required />
      </div>
      <button type="submit" class="btn">Sign In</button>
    </form>
    <div id="error-msg" style="color: #ef4444; font-size: 13px; text-align: center; margin-top: 16px; display: none;"></div>
  </div>

  <script>
    document.getElementById('doctorLoginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      try {
        const res = await fetch('http://localhost:3000/api/doctor/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        
        if (data.success) {
          localStorage.setItem('doctorToken', data.token);
          alert('Doctor Login Successful! (Dashboard UI integration pending)');
          // window.location.href = 'doctor-dashboard.html';
        } else {
          const errEl = document.getElementById('error-msg');
          errEl.textContent = data.message || 'Access denied.';
          errEl.style.display = 'block';
        }
      } catch (err) {
        alert('Server unreachable');
      }
    });
  </script>
</body>
</html>
